<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>To-do List UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #aeb7c3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .wrapper {
            width: 350px;
        }

        .card {
            background: #f4f4f4;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .top {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #777;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 20px;
            color: #2d3a4b;
        }

        .week {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            color: #666;
        }

        .day span {
            display: inline-block;
            margin-top: 5px;
        }

        .day .active {
            background: #1f3c88;
            color: white;
            width: 28px;
            height: 28px;
            line-height: 28px;
            border-radius: 50%;
        }

        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #dbe3f0;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #3a4a63;
        }

        .task .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .circle {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #eef2f7;
            border: 2px solid #c4ccd8;
        }

        .check {
            width: 18px;
            height: 18px;
            background: #1db954;
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .check::before {
            content: "✓";
        }

        .animation {
           
        }

        .completed {
            opacity: 0.7;
            text-decoration: line-through;
        }

        .time-box {
            background: #cdd6e5;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="card">

            <div class="top">
                <div class="date">Tue Jan 18 2022</div>
                <div class="time">1:06:15 PM</div>
            </div>

            <h2>To-do List</h2>

            <div class="week">
                <div class="day">sun<br><span class=d-date>24</span></div>
                <div class="day">mon<br><span class=d-date>25</span></div>
                <div class="day">tue<br><span class=d-date>26</span></div>
                <div class="day">wed<br><span class=d-date>27</span></div>
                <div class="day">thu<br><span class=d-date>28</span></div>
                <div class="day">fri<br><span class=d-date>29</span></div>
                <div class="day">sat<br><span class=d-date>30</span></div>
            </div>


            <div class="task">
                <div class="left">
                    <span class="circle"></span>
                    take out the trash
                </div>
                <div class="time-box">9:00 AM</div>
            </div>

            <div class="task">
                <div class="left">
                    <span class="circle"></span>
                    do homework
                </div>
                <div class="time-box">12:00 PM</div>
            </div>

            <div class="task">
                <div class="left">
                    <span class="circle"></span>
                    go to grocery store
                </div>
                <div class="time-box">1:00 PM</div>
            </div>

            <div class="task">
                <div class="left">
                    <span class="circle"></span>
                    run 5 kilometers
                </div>
                <div class="time-box">4:20 PM</div>
            </div>

            <div class="task">
                <div class="left">
                    <span class="circle"></span>
                    load the dishwasher
                </div>
                <div class="time-box">9:00 PM</div>
            </div>

            <div class="task">
                <div class="left">
                    <span class="circle"></span>
                    Take out the trash
                </div>
                <div class="time-box">9:00 AM</div>
            </div>

        </div>
    </div>
    <script>
        let topdate = document.querySelector(".date");
        topdate.innerHTML = new Date().toDateString();

        let h = new Date().getHours();
        let m = new Date().getMinutes();
        let s = new Date().getSeconds();
        let toptime = h + ":" + m + ":" + s;
        document.querySelector(".time").innerHTML = toptime;



        // let date =document.querySelector(".d-date");

        // date = new Map([

        let days = document.querySelectorAll(".day");
        let today = new Date();
        let currentday = today.getDay();
        days.forEach((day, index) => {
            let todaydate = day.querySelector(".d-date");
            tempdate = new Date();
            tempdate.setDate(today.getDate() - currentday + index);
            todaydate.textContent = tempdate.getDate();

            if (currentday == index) {
                todaydate.classList.add("active");

            }
            else {
                todaydate.classList.remove("active");
            }
        });


        let tasks = document.querySelectorAll(".task");
        tasks.forEach(function (task) {

            task.addEventListener("click", function () {
                let circle = task.querySelector(".circle");

                if (!task.classList.contains("completed")) {
                    task.classList.add("completed");
                    circle.classList.add("check");
                  
                }

                else {
                    task.classList.remove("completed");
                    circle.classList.remove("check");
                    
                }
            });
        });






    </script>

</body>


</html>
